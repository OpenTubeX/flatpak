app-id: org.opentubex.OpenTubeX
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
  - --own-name=org.mpris.MediaPlayer2.chromium.*
  - --own-name=org.mpris.MediaPlayer2.opentubex
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.gnome.SettingsDaemon
modules:
  - name: opentubex
    buildsystem: simple
    sources:
      - type: file
        only-arches:
          - x86_64
        url: https://github.com/OpenTubeX/OpenTubeX/releases/download/v0.25.7-beta/opentubex-0.25.7-beta-linux-x64-portable.zip
        sha256: c863c334335dc58563a1f419f90f020708a01e8df81770a8b4d507e6a8ffbf7d
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/OpenTubeX/OpenTubeX/releases?per_page=1
          version-query: .[0].tag_name
          url-query: .[0].assets[] | select(.name | endswith("-linux-x64-portable.zip")) | .browser_download_url
          timestamp-query: .[0].published_at
          release-url-template: https://github.com/OpenTubeX/OpenTubeX/releases/tag/$version
      - type: file
        only-arches:
          - aarch64
        url: https://github.com/OpenTubeX/OpenTubeX/releases/download/v0.25.7-beta/opentubex-0.25.7-beta-linux-arm64-portable.zip
        sha256: b74f66b4c3faed849e3ceaefb7323398f60e90141db44f931a3730d99b28bbd2
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/OpenTubeX/OpenTubeX/releases?per_page=1
          version-query: .[0].tag_name
          url-query: .[0].assets[] | select(.name | endswith("-linux-arm64-portable.zip")) | .browser_download_url
          timestamp-query: .[0].published_at
          release-url-template: https://github.com/OpenTubeX/OpenTubeX/releases/tag/$version
      - type: file
        url: https://raw.githubusercontent.com/OpenTubeX/OpenTubeX/development/_icons/icon.svg
        sha256: e1b049358231e105b2b04458ffbc08613674284d7be86a4b00b88cfe46384cb7
      - type: file
        path: run.sh
      - type: file
        path: org.opentubex.OpenTubeX.desktop
      - type: file
        path: org.opentubex.OpenTubeX.metainfo.xml
    build-commands:
      - unzip opentubex-*.zip -d /app/opentubex
      - chmod +x /app/opentubex/opentubex
      - install -m755 run.sh /app/bin/
      - install -Dm644 icon.svg /app/share/icons/hicolor/scalable/apps/org.opentubex.OpenTubeX.svg
      - install -Dm644 org.opentubex.OpenTubeX.desktop -t /app/share/applications/
      - install -Dm644 org.opentubex.OpenTubeX.metainfo.xml -t /app/share/metainfo/
      - patch-electron-desktop-filename "${FLATPAK_DEST}"/opentubex/resources/app.asar
